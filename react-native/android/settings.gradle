pluginManagement {
    plugins {
        id 'com.android.library' version '8.11.2'
        id 'com.android.application' version '8.11.2'
        id 'org.jetbrains.kotlin.android' version '2.1.0'
        id 'org.jetbrains.kotlin.plugin.compose' version '2.1.0'
        id 'org.jetbrains.kotlin.plugin.serialization' version '2.1.0'
    }
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()   // tech.digia:engage published at https://central.sonatype.com/artifact/tech.digia/engage
        maven { url 'https://jitpack.io' }
    }
}

rootProject.name = "digia-engage-rn"
