name: Bump SDK Version

# Bumps the version of a single platform SDK (Android, React Native, or Flutter),
# regenerates that platform's generated version file, and commits the change back
# to the branch the workflow ran on. Each platform is versioned independently and
# is bumped relative to its own current version.
#
# iOS is bumped by the matching workflow in the digia_engage_iOS repo.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Which platform SDK to bump"
        required: true
        type: choice
        options:
          - android
          - react-native
          - flutter
      version_type:
        description: "Semver part to bump"
        required: true
        type: choice
        default: patch
        options:
          - major
          - minor
          - patch
          - beta
      changelog:
        description: "Flutter only: ';'-separated CHANGELOG entries"
        required: false
      create_tag:
        description: "Push a <platform>.<version> tag (e.g. android.2.2.3) to trigger publish"
        required: false
        type: boolean
        default: false

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node (react-native)
        if: ${{ github.event.inputs.platform == 'react-native' }}
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Make scripts executable
        run: chmod +x scripts/bump-semver.sh flutter/bump_version.sh

      - name: Bump Android
        if: ${{ github.event.inputs.platform == 'android' }}
        run: |
          current=$(grep "^VERSION_NAME=" android/gradle.properties | cut -d'=' -f2)
          new=$(scripts/bump-semver.sh "$current" "${{ github.event.inputs.version_type }}")
          sed -i "s/^VERSION_NAME=.*/VERSION_NAME=$new/" android/gradle.properties
          echo "NEW_VERSION=$new" >> "$GITHUB_ENV"
          echo "Android: $current -> $new"

      - name: Bump React Native
        if: ${{ github.event.inputs.platform == 'react-native' }}
        run: |
          cd react-native
          current=$(node -p "require('./package.json').version")
          new=$(../scripts/bump-semver.sh "$current" "${{ github.event.inputs.version_type }}")
          # npm version runs the "version" lifecycle script, which regenerates src/version.ts.
          npm version "$new" --no-git-tag-version
          echo "NEW_VERSION=$new" >> "$GITHUB_ENV"
          echo "React Native: $current -> $new"

      - name: Bump Flutter
        if: ${{ github.event.inputs.platform == 'flutter' }}
        run: |
          cd flutter
          # bump_version.sh updates pubspec.yaml, lib/src/version.dart and CHANGELOG.md,
          # and writes new_version=... to $GITHUB_ENV.
          bash bump_version.sh "${{ github.event.inputs.changelog }}" "${{ github.event.inputs.version_type }}"
          echo "NEW_VERSION=$new_version" >> "$GITHUB_ENV"
          echo "Flutter -> $new_version"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(${{ github.event.inputs.platform }}): bump version to $NEW_VERSION"
          git push

      - name: Create tag
        if: ${{ github.event.inputs.create_tag == 'true' }}
        run: |
          tag="${{ github.event.inputs.platform }}.$NEW_VERSION"
          git tag "$tag"
          git push origin "$tag"
          echo "Pushed tag $tag"
